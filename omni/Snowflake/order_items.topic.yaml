base_view: analytics_prod_ecomm__order_items

ai_context: |
  This topic models an online shop retailer's order line items — one row per item within an order.
  Base view: analytics_prod_ecomm__order_items (orders), joined to:
    - analytics_prod_ecomm__users (the customer / buyer)
    - analytics_prod_ecomm__products (the product catalog, reached via the inventory_items bridge)

  Field-mapping guidance for natural-language questions:
    - "revenue", "sales", "GMV"        -> analytics_prod_ecomm__order_items.valid_revenue (excludes Cancelled; preferred default)
    - "gross revenue" / all statuses   -> analytics_prod_ecomm__order_items.sale_price_sum (Total Revenue, includes Cancelled + Returned)
    - "net revenue" / after returns    -> analytics_prod_ecomm__order_items.net_revenue
    - "orders" / "number of orders"    -> analytics_prod_ecomm__order_items.order_count (distinct orders)
    - "items sold" / "units"           -> analytics_prod_ecomm__order_items.count
    - "customers" / "buyers"           -> analytics_prod_ecomm__order_items.unique_customers
    - "AOV" / "average order value"    -> analytics_prod_ecomm__order_items.average_order_value
    - "margin %" / "profit margin"     -> analytics_prod_ecomm__order_items.gross_margin_rate
    - "return rate"                    -> analytics_prod_ecomm__order_items.return_rate
    - "discount"                       -> analytics_prod_ecomm__order_items.total_discount / discount_rate

  Grain is per line item: use `count` for items sold and `order_count` (distinct orders) for order counts.
  inventory_items is a pass-through join bridge only — do not surface its fields for analysis.

joins:
  analytics_prod_ecomm__users: {}
  analytics_prod_ecomm__inventory_items:
    analytics_prod_ecomm__products: {}

views:
  analytics_prod_ecomm__order_items:
    dimensions:
      discount_amount:
        sql: "${analytics_prod_ecomm__products.retail_price} - ${analytics_prod_ecomm__order_items.sale_price}"
        format: currency_2
        label: Discount Amount
        description: Difference between the product's list price and the actual sale price for this line item.
    measures:
      total_list_price:
        sql: "${analytics_prod_ecomm__products.retail_price}"
        aggregate_type: sum
        format: currency_2
        label: Total List Price
        description: Total product list (retail) price across line items, before discount.

      total_discount:
        sql: "${analytics_prod_ecomm__products.retail_price} - ${analytics_prod_ecomm__order_items.sale_price}"
        aggregate_type: sum
        format: currency_2
        label: Total Discount
        description: Total discount given (list price minus sale price) across line items.

      discount_rate:
        sql: "${total_discount} / NULLIF(${total_list_price}, 0)"
        format: percent_2
        label: Discount Rate
        description: Total discount as a share of total list price.
